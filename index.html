<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار بوتاني 2</title>
    <style>
        :root { --brand-color: #6daea5; --bg-color: #f4f7f6; --text-color: #333; }
        .dark-mode { --brand-color: #588e86; --bg-color: #1a1a1a; --text-color: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; transition: 0.3s; }
        .container { max-width: 800px; margin: auto; background: var(--bg-color); padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid var(--brand-color); }
        .header { text-align: center; border-bottom: 2px solid var(--brand-color); padding-bottom: 20px; margin-bottom: 20px; }
        .header img { max-width: 100%; width: 100%; height: auto; margin-bottom: 10px; display: block; }
        
        /* قسم الدعوة المحدث */
        .invite-section { text-align: center; padding: 20px; background: #fff; border-radius: 15px; margin-bottom: 25px; border: 1px dashed var(--brand-color); }
        .social-cards { display: flex; gap: 20px; justify-content: center; margin-top: 15px; }
        .social-btn { padding: 10px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; color: white; display: flex; align-items: center; gap: 8px; font-size: 16px; }
        .telegram-btn { background-color: #0088cc; }
        .youtube-btn { background-color: #ff0000; }
        .social-btn:hover { opacity: 0.9; transform: scale(1.05); }
        .icon { font-size: 20px; }

        .q-block { margin-bottom: 25px; padding: 15px; border: 1px solid var(--brand-color); border-radius: 10px; background: white; color: #333; }
        button { display: block; margin: 5px 0; padding: 10px; width: 100%; cursor: pointer; border: 1px solid var(--brand-color); border-radius: 5px; transition: 0.3s; background: white; }
        button:hover { background: var(--brand-color); color: white; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        .result-box { text-align: center; font-size: 20px; font-weight: bold; margin-top: 20px; color: var(--brand-color); }
        #submit-btn, #next-btn, #prev-btn, #show-wrong-btn, #dark-mode-btn { background: var(--brand-color); color: white; border: none; font-weight: bold; margin-top: 10px; padding: 10px; }
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--brand-color); width: 0%; }
    </style>
</head>
<body>

<div class="container">
    <button id="dark-mode-btn">الوضع الليلي 🌙</button>
    <div class="header">
        <img src="logo.png" alt="أثر سامي">
        <p>"اللهم علمنا ما ينفعنا وانفعنا بما علمتنا"</p>
        
        <div class="invite-section">
            <h3 style="color: var(--brand-color); margin-top: 0;">طريق العلم.. طريق إلى الجنة</h3>
            <p style="margin: 10px 0;">بعد أن أديت واجبك في طلب العلم، يسعدنا أن نكون رفقاءك في رحلة تزكية النفس والزاد الإيماني:</p>
            <div class="social-cards">
                <a href="https://t.me/Athar_Sami" target="_blank" class="social-btn telegram-btn">
                    <span class="icon">✈️</span> التليجرام
                </a>
                <a href="https://youtube.com/@athar_samii?si=UnVOB4o_tgVrg4yW" target="_blank" class="social-btn youtube-btn">
                    <span class="icon">▶️</span> اليوتيوب
                </a>
            </div>
        </div>
    </div>

    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
    <div id="quiz-area"></div>
    <div style="display: flex; gap: 10px;">
        <button id="prev-btn" style="display:none;">الجزء السابق</button>
        <button id="next-btn" style="display:none;">الجزء التالي</button>
    </div>
    <button id="submit-btn" style="display:none;">عرض النتيجة النهائية</button>
    <button id="show-wrong-btn" style="display:none; background: #dc3545;">عرض الأسئلة التي أخطأت فيها</button>
    <div id="result" class="result-box"></div>
    <div id="wrong-questions-area"></div>
</div>

<script src="quiz_data.js"></script>
<script>
    const area = document.getElementById('quiz-area');
    const nextBtn = document.getElementById('next-btn');
    const prevBtn = document.getElementById('prev-btn');
    const subBtn = document.getElementById('submit-btn');
    const progress = document.getElementById('progress');
    const darkBtn = document.getElementById('dark-mode-btn');
    
    let userAnswers = JSON.parse(localStorage.getItem('userAnswers')) || [];
    const questionsPerPart = 50;
    let currentPart = parseInt(localStorage.getItem('currentPart')) || 0;

    darkBtn.onclick = () => document.body.classList.toggle('dark-mode');

    function handleSelection(btn, selectedIdx, correctIdx, block, idx, q) {
        let buttons = block.querySelectorAll('button');
        buttons.forEach(b => b.style.pointerEvents = 'none');
        if(selectedIdx === correctIdx) { btn.className = 'correct'; userAnswers[idx] = true; }
        else { btn.className = 'wrong'; buttons[correctIdx].className = 'correct'; userAnswers[idx] = false; }
        localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
        let explainP = document.createElement('p');
        explainP.style.marginTop = "10px";
        explainP.innerHTML = `<strong>الشرح:</strong> ${q.explain}`;
        block.appendChild(explainP);
    }

    function loadPart(partIdx) {
        area.innerHTML = '';
        currentPart = partIdx;
        localStorage.setItem('currentPart', currentPart);
        const start = partIdx * questionsPerPart;
        const end = Math.min(start + questionsPerPart, ALL_QUESTIONS.length);
        
        ALL_QUESTIONS.slice(start, end).forEach((q, i) => {
            let idx = start + i;
            let block = document.createElement('div');
            block.className = 'q-block';
            block.innerHTML = `<p><strong>${idx + 1}. ${q.q}</strong></p>`;
            if (q.options) {
                q.options.forEach((opt, j) => {
                    let btn = document.createElement('button');
                    btn.innerText = opt;
                    btn.onclick = () => handleSelection(btn, j, q.answer, block, idx, q);
                    block.appendChild(btn);
                });
            } else {
                ["صح", "خطأ"].forEach((val, j) => {
                    let btn = document.createElement('button');
                    btn.innerText = val;
                    let correctIdx = (q.answer === true || q.answer === "true") ? 0 : 1;
                    btn.onclick = () => handleSelection(btn, j, correctIdx, block, idx, q);
                    block.appendChild(btn);
                });
            }
            area.appendChild(block);
        });

        progress.style.width = ((end / ALL_QUESTIONS.length) * 100) + "%";
        prevBtn.style.display = partIdx > 0 ? 'block' : 'none';
        nextBtn.style.display = end < ALL_QUESTIONS.length ? 'block' : 'none';
        subBtn.style.display = end >= ALL_QUESTIONS.length ? 'block' : 'none';
    }

    nextBtn.onclick = () => { loadPart(++currentPart); window.scrollTo(0, 0); };
    prevBtn.onclick = () => { loadPart(--currentPart); window.scrollTo(0, 0); };

    subBtn.onclick = () => {
        let score = userAnswers.filter(a => a === true).length;
        let percent = (score / ALL_QUESTIONS.length) * 100;
        let msg = percent >= 80 ? "ممتاز! أنت متمكن من مادة البوتاني، بارك الله في علمك." : "لا بأس، حاول مراجعة الأخطاء لتزداد علماً.";
        document.getElementById('result').innerText = `نتيجتك: ${percent.toFixed(1)}% (${score}/${ALL_QUESTIONS.length}) - ${msg}`;
        document.getElementById('show-wrong-btn').style.display = 'block';
    };

    document.getElementById('show-wrong-btn').onclick = () => {
        let wrongArea = document.getElementById('wrong-questions-area');
        wrongArea.innerHTML = '<h2>الأسئلة التي تحتاج مراجعة:</h2>';
        ALL_QUESTIONS.forEach((q, idx) => {
            if (userAnswers[idx] === false) {
                wrongArea.innerHTML += `<div class="q-block" style="border-color:red"><p>${q.q}</p><p><strong>الشرح:</strong> ${q.explain}</p></div>`;
            }
        });
    };

    loadPart(currentPart);
</script>
</body>
</html>
